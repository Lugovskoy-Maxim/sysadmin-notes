name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        id: auth
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=0

          if [ -z "${SSH_HOST:-}" ]; then
            echo "::error::Secret SSH_HOST is missing."
            missing=1
          fi

          if [ -z "${SSH_USER:-}" ]; then
            echo "::error::Secret SSH_USER is missing (for example: root)."
            missing=1
          fi

          if [ -n "${SSH_PASSWORD:-}" ]; then
            echo "method=password" >> "$GITHUB_OUTPUT"
            echo "Using SSH password authentication."
          elif [ -n "${SSH_PRIVATE_KEY:-}" ] && printf '%s' "$SSH_PRIVATE_KEY" | grep -q 'BEGIN .*PRIVATE KEY'; then
            echo "method=key" >> "$GITHUB_OUTPUT"
            echo "Using SSH key authentication."
          else
            echo "::error::Set either SSH_PASSWORD (for password login) or SSH_PRIVATE_KEY (for key login)."
            echo "::error::Password: add secret SSH_PASSWORD with your server password."
            echo "::error::Key: run bash deploy/setup-github-deploy.sh"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Deploy over SSH (password)
        if: steps.auth.outputs.method == 'password'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.DEPLOY_PATH || '/opt/sysadmin-notes' }}"
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            bash deploy/deploy.sh
            docker image prune -f

      - name: Deploy over SSH (key)
        if: steps.auth.outputs.method == 'key'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.DEPLOY_PATH || '/opt/sysadmin-notes' }}"
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            bash deploy/deploy.sh
            docker image prune -f