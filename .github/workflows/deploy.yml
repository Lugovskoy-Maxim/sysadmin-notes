name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check SSH secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          [ -n "${SSH_HOST:-}" ] || { echo "::error::SSH_HOST is required"; exit 1; }
          [ -n "${SSH_USER:-}" ] || { echo "::error::SSH_USER is required"; exit 1; }
          if [ -z "${SSH_PASSWORD:-}" ] && [ -z "${SSH_PRIVATE_KEY:-}" ]; then
            echo "::error::Set SSH_PASSWORD or SSH_PRIVATE_KEY"
            exit 1
          fi

      - name: Deploy over SSH (password)
        if: ${{ secrets.SSH_PASSWORD != '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 40m
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/sysadmin-notes
            git pull origin main
            bash deploy/deploy.sh

      - name: Deploy over SSH (key)
        if: ${{ secrets.SSH_PASSWORD == '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 40m
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/sysadmin-notes
            git pull origin main
            bash deploy/deploy.sh