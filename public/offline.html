<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#00796b" />
    <title>Sysadmin Notes — офлайн</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f2f3f7;
        color: #1d1d1f;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          background: #1e1f22;
          color: #f2f3f5;
        }
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        max-width: 420px;
        text-align: center;
        display: grid;
        gap: 12px;
      }
      h1 {
        margin: 0;
        font-size: 1.5rem;
      }
      p {
        margin: 0;
        color: #6e6e73;
        line-height: 1.5;
      }
      button {
        margin-top: 8px;
        border: 0;
        border-radius: 8px;
        padding: 12px 18px;
        background: #00796b;
        color: #fff;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Нет сети</h1>
      <p>Приложение открыто офлайн. Кэшированные страницы доступны, но синхронизация с API возобновится после подключения.</p>
      <button type="button" onclick="location.reload()">Повторить</button>
    </main>
  </body>
</html>
